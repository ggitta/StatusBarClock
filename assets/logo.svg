<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">StatusBarClock logo</title>
  <desc id="desc">A rounded macOS-style clock icon with a menu bar strip and neon green hands.</desc>
  <defs>
    <linearGradient id="background" x1="160" y1="96" x2="864" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="0.52" stop-color="#0D2B3A"/>
      <stop offset="1" stop-color="#15251C"/>
    </linearGradient>
    <linearGradient id="ring" x1="264" y1="212" x2="760" y2="812" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#64D2FF"/>
      <stop offset="1" stop-color="#30D158"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="36" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="96" y="96" width="832" height="832" rx="196" fill="url(#background)" filter="url(#shadow)"/>
  <rect x="176" y="178" width="672" height="92" rx="46" fill="#F5F7FA" opacity="0.92"/>
  <circle cx="232" cy="224" r="18" fill="#FF5F57"/>
  <circle cx="288" cy="224" r="18" fill="#FFBD2E"/>
  <circle cx="344" cy="224" r="18" fill="#28C840"/>
  <path d="M456 224H760" stroke="#172033" stroke-width="28" stroke-linecap="round" opacity="0.72"/>

  <circle cx="512" cy="584" r="282" fill="#071118" opacity="0.64"/>
  <circle cx="512" cy="584" r="238" fill="none" stroke="url(#ring)" stroke-width="38"/>
  <circle cx="512" cy="584" r="188" fill="#0C1822" stroke="#FFFFFF" stroke-width="6" opacity="0.88"/>

  <g stroke="#DDE6EE" stroke-width="18" stroke-linecap="round">
    <path d="M512 408V448"/>
    <path d="M512 720V760"/>
    <path d="M336 584H376"/>
    <path d="M648 584H688"/>
  </g>
  <g stroke="#30D158" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
    <path d="M512 584V452"/>
    <path d="M512 584L632 656"/>
  </g>
  <circle cx="512" cy="584" r="30" fill="#F5F7FA"/>
</svg>
